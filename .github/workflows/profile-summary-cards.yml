# GitHubのアクティビティをグラフカード画像として生成し、リポジトリに保存するワークフロー
# 毎日UTC0時（JST9時）に自動実行する
name: プロフィールサマリーカード生成

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
